name: visual_dual_arm_sync

services:
  isaac:
    image: nvcr.io/nvidia/isaac-sim:${ISAAC_SIM_VERSION}
    container_name: visual_dual_arm_isaac

    network_mode: host
    shm_size: "8gb"

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu

    environment:
      ACCEPT_EULA: "Y"

      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "all"

      DISPLAY: "${DISPLAY}"
      XAUTHORITY: "/isaac-sim/.Xauthority"

      ISAACSIM_HOST: "${ISAACSIM_HOST}"
      ISAACSIM_SIGNAL_PORT: "${ISAACSIM_SIGNAL_PORT:-49100}"
      ISAACSIM_STREAM_PORT: "${ISAACSIM_STREAM_PORT:-47998}"

      ROS_DISTRO: "jazzy"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTRTPS_DEFAULT_PROFILES_FILE: "/workspace/project/config/fastdds.xml"

      LD_LIBRARY_PATH: "/isaac-sim/exts/isaacsim.ros2.core/jazzy/lib"

    volumes:
      - ./isaac-sim/cache/main:/isaac-sim/.cache:rw
      - ./isaac-sim/cache/computecache:/isaac-sim/.nv/ComputeCache:rw
      - ./isaac-sim/config:/isaac-sim/.nvidia-omniverse/config:rw
      - ./isaac-sim/data:/isaac-sim/.local/share/ov/data:rw
      - ./isaac-sim/logs:/isaac-sim/.nvidia-omniverse/logs:rw
      - ./isaac-sim/pkg:/isaac-sim/.local/share/ov/pkg:rw
      - ./isaac-sim/hub:/var/cache/hub:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/isaac-sim/.Xauthority:ro

      - ./isaac-sim/project:/workspace/project/isaac:rw
      - ./config:/workspace/project/config:ro
      - ./results:/workspace/project/results:rw

    user: "1234:1234"
    working_dir: /isaac-sim

    entrypoint:
      - /bin/bash
      - -lc

    command:
      - |
        exec sleep infinity

    stdin_open: true
    tty: true
    stop_grace_period: 30s

  ros:
    build:
      context: ./docker/ros
      args:
        USERNAME: "${HOST_USER}"
        USER_UID: "${HOST_UID}"
        USER_GID: "${HOST_GID}"

    container_name: visual_dual_arm_ros

    network_mode: host
    shm_size: "2gb"

    environment:
      ROS_DISTRO: "jazzy"
      ROS_DOMAIN_ID: "${ROS_DOMAIN_ID}"
      RMW_IMPLEMENTATION: "rmw_fastrtps_cpp"
      FASTRTPS_DEFAULT_PROFILES_FILE: "/workspace/project/config/fastdds.xml"

      DISPLAY: "${DISPLAY}"
      QT_X11_NO_MITSHM: "1"

    volumes:
      - ./ros_ws:/workspace/project/ros_ws:rw
      - ./isaac-sim/project:/workspace/project/isaac:rw
      - ./config:/workspace/project/config:ro
      - ./results:/workspace/project/results:rw

      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    working_dir: /workspace/project/ros_ws

    command:
      - sleep
      - infinity

    stdin_open: true
    tty: true